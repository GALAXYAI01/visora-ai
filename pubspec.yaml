name: visora
description: Visora - Know What Your AI Really Decides
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.4

  # Networking
  dio: ^5.4.3
  web_socket_channel: ^2.4.0

  # UI & charts
  fl_chart: ^0.67.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

  # File handling (web-compatible)
  file_picker: ^8.0.3
  url_launcher: ^6.3.0

  # Utilities
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pdf: ^3.11.1
  printing: ^5.13.4
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
