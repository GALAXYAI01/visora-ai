<svg viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Rejected person (red) -->
  <circle cx="80" cy="50" r="22" fill="#EF4444" opacity="0.9"/>
  <path d="M40 130 Q40 90 80 90 Q120 90 120 130" fill="#EF4444" opacity="0.7"/>
  <!-- X mark -->
  <line x1="68" y1="38" x2="92" y2="62" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="38" x2="68" y2="62" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow -->
  <line x1="140" y1="80" x2="180" y2="80" stroke="#6B7280" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="180,75 190,80 180,85" fill="#6B7280"/>
  <!-- Approved person (green) -->
  <circle cx="240" cy="50" r="22" fill="#22C55E" opacity="0.9"/>
  <path d="M200 130 Q200 90 240 90 Q280 90 280 130" fill="#22C55E" opacity="0.7"/>
  <!-- Check mark -->
  <polyline points="228,52 237,62 255,42" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Labels -->
  <text x="80" y="152" text-anchor="middle" fill="#EF4444" font-size="11" font-family="sans-serif" font-weight="600">REJECTED</text>
  <text x="240" y="152" text-anchor="middle" fill="#22C55E" font-size="11" font-family="sans-serif" font-weight="600">HIRED</text>
  <text x="160" y="72" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="sans-serif">same resume</text>
</svg>
