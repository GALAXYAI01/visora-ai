<svg viewBox="0 0 360 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural network nodes and connections -->
  <!-- Layer 1 nodes -->
  <circle cx="50" cy="40" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="50" cy="70" r="8" fill="#3B82F6" opacity="0.6"/>
  <circle cx="50" cy="100" r="8" fill="#3B82F6" opacity="0.8"/>
  <!-- Layer 2 nodes -->
  <circle cx="140" cy="30" r="10" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="140" cy="70" r="10" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="140" cy="110" r="10" fill="#8B5CF6" opacity="0.9"/>
  <!-- Layer 3 nodes -->
  <circle cx="230" cy="50" r="9" fill="#3B82F6" opacity="0.8"/>
  <circle cx="230" cy="90" r="9" fill="#3B82F6" opacity="0.6"/>
  <!-- Output node -->
  <circle cx="310" cy="70" r="14" fill="#22C55E" opacity="0.9"/>
  <text x="310" y="75" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">✓</text>

  <!-- Connections layer 1 to 2 -->
  <line x1="58" y1="40" x2="130" y2="32" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>
  <line x1="58" y1="40" x2="130" y2="70" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>
  <line x1="58" y1="70" x2="130" y2="32" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>
  <line x1="58" y1="70" x2="130" y2="70" stroke="#3B82F6" stroke-width="1.2" opacity="0.6"/>
  <line x1="58" y1="70" x2="130" y2="110" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>
  <line x1="58" y1="100" x2="130" y2="70" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>
  <line x1="58" y1="100" x2="130" y2="110" stroke="#3B82F6" stroke-width="1.2" opacity="0.6"/>
  <!-- Connections layer 2 to 3 -->
  <line x1="150" y1="32" x2="221" y2="52" stroke="#8B5CF6" stroke-width="0.8" opacity="0.4"/>
  <line x1="150" y1="70" x2="221" y2="52" stroke="#8B5CF6" stroke-width="1.2" opacity="0.6"/>
  <line x1="150" y1="70" x2="221" y2="90" stroke="#8B5CF6" stroke-width="1.2" opacity="0.6"/>
  <line x1="150" y1="110" x2="221" y2="90" stroke="#8B5CF6" stroke-width="0.8" opacity="0.4"/>
  <!-- Connections to output -->
  <line x1="239" y1="52" x2="296" y2="65" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
  <line x1="239" y1="90" x2="296" y2="75" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>

  <!-- Bias warning indicator -->
  <circle cx="140" cy="70" r="18" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="170" y="25" fill="#EF4444" font-size="9" font-family="sans-serif" font-weight="600">BIAS DETECTED</text>
  <line x1="165" y1="28" x2="148" y2="58" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
</svg>
